<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesion</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo-container">
                    <img src="/maqueta/imagenes/logo.png" alt="404 Logo" class="logo-img">
                </div>
                <span class="brand-name">404 Room Not Found</span>
            </div>
            <input type="checkbox" id="menu-toggle" class="menu-checkbox">
            <label for="menu-toggle" class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </label>
            
            <ul class="nav-links">
                <li><a href="#" class="nav-item">Inicio</a></li>
                <li><a href="#" class="nav-item">Quiénes Somos</a></li>
                <li><a href="#" class="nav-item">Registrar</a></li>
                <li><a href="#" class="nav-item">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="formulario">
        <h1>Inicio de Sesion</h1>
        <form method="post">
            <div class="username">
                <input type="email" required>
                <span></span>
                <label>Correo Electronico</label>
            </div>
            <div class="password">
                <input type="password" required>
                <span></span>
                <label>Contraseña</label>
            </div>
            <div class="buttom">
                <input type="submit" value="Iniciar Sesion">
            </div>
            <div class="olvidaste_tu_contrasena">¿Olvidaste tu Contraseña?
            </div>
            <div class="registrarse">
                <a href="registro.html">Quiero Registrarme</a>
            </div>
        </form>

    </div>

</body>
</html>
